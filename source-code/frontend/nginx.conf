server { # Khối cấu hình một máy chủ ảo của Nginx
  listen 80; # Lắng nghe cổng 80 (HTTP)
  server_name localhost; # Tên miền phục vụ
  root /usr/share/nginx/html; # Thư mục gốc chứa file tĩnh (bản build frontend)
  index index.html; # File mặc định khi truy cập thư mục

  # Chuyển tiếp gọi API tới service backend trong cùng mạng docker-compose
  location /api/ { # Mọi request bắt đầu bằng /api/
    proxy_pass http://backend:4000; # Chuyển tiếp sang service "backend" cổng 4000
    proxy_set_header Host $host; # Giữ nguyên header Host gốc
    proxy_set_header X-Real-IP $remote_addr; # Gửi kèm IP thật của client
  } # Kết thúc location /api/

  # SPA fallback: mọi route trả về index.html
  location / { # Với mọi đường dẫn khác
    try_files $uri $uri/ /index.html; # Tìm file/thư mục tương ứng; không có thì trả index.html để React Router xử lý
  } # Kết thúc location /
} # Kết thúc server
